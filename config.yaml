# Solar collector configuration. Every value here is validated at startup
# (src/solarmon/config.py); a bad value stops the collector with a clear error.
# Hardware identifiers are seeded from PROVEN.md.

stick:
  ip: 192.168.50.82
  serial: 3565365971        # numeric logger serial, NOT the sticker product code
  port: 8899
  slave_id: 1
  socket_timeout_s: 8

polling:
  interval_s: 5             # PROVEN.md: ~5s is plenty, poll gently
  read_retries: 3           # per-read retries before the block counts as failed
  backoff_s: 10             # wait before the single clean reconnect
  stale_after_s: 30         # no good poll for this long -> data marked stale
  lockout_wait_s: 240       # port 8899 refusing: wait this out ONCE, then stop and report

battery:
  nominal_kwh: 15.36        # 3x Eco-Worthy Cubix100 48V
  usable_fraction: 0.8      # of nominal capacity, used by runtime estimator
  pack_count_expected: 3

thresholds:
  continuous_load_w: 6500   # inverter continuous rating, for load-vs-safe-zone
  low_soc_alert_pct: 40     # alert when SoC drops below this during an outage
  bypass_amps_per_leg: 40   # bypass relay limit per 120V leg (headroom lanes, chart line)

location:
  # Only used by the offline sunrise/sunset formula on the outage burn-down.
  # Never leaves this machine; no network calls.
  lat: 45.04                # Bracebridge, ON
  lon: -79.31

outage:
  debounce_polls: 3         # ~15s at 5s/poll before an outage is declared/ended

runtime_estimator:
  ema_window_min: 10        # smoothing window for discharge-power EMA

tou:
  timezone: America/Toronto
  # Hydro One standard TOU, Nov 2025 - Oct 2026 defaults, cents per kWh
  rates_cents_per_kwh:
    off_peak: 9.8
    mid_peak: 15.7
    on_peak: 20.3
  # Optional all-in cents/kWh override (delivery + rebate included). null = off.
  all_in_override_cents_per_kwh: null

alerts:
  ntfy_topic: ""            # empty = alerts disabled (config-gated)
  ntfy_server: https://ntfy.sh

database:
  path: data/solarmon.db
  retention_days_raw: 30    # raw samples pruned after this; rollups/events kept forever

logging:
  level: INFO
  file: data/collector.log  # rotating file; console gets the same lines
